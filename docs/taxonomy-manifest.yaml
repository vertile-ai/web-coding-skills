version: 2
taxonomy_rule:
  business_axis: niche-by-category-size (not popularity)
  architecture_axis: reuse-by-beneficiary-coverage (>=10 business categories)
tier_policy:
  business:
    tier2_rule: first two categories per family
    tier3_rule: first category of each family from tier2
  architecture:
    tier1_rule: SKILL + implementation reference + beneficiary/overlap evidence
    tier2_rule: tier1 + source_audit_min_rows >= 3 + README mention
    tier3_rule: tier2 + smoke validation evidence
