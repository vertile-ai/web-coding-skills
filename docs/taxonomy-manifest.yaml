- key: architecture-identity-access
  title: Architecture — Identity & Access Modules
  axis: architecture
  categories:
  - category: auth-social-sso
    family: architecture-identity-access
    axis: architecture
    artifact_tier: tier2
    distinct_implementation_drives:
    - provider callback verification
    - account-linking and identity conflict handling
    - session/token lifecycle hardening
    architecture_boundary: Social login identity module limited to Google/GitHub OAuth flows and linked-session management.
    proof:
      beneficiary_matrix_ref: auth-social-sso/references/implementation.md#beneficiary-matrix
      beneficiary_min_categories: 10
      overlap_review_ref: auth-social-sso/references/implementation.md#overlap-review
      overlap_required_siblings: 3
      source_audit_min_rows: 3
    artifacts:
      skill_md: true
      implementation_ref: true
      smoke_required: false
  - category: tenant-rbac-policy
    family: architecture-identity-access
    axis: architecture
    artifact_tier: tier1
    distinct_implementation_drives:
    - tenant-scoped permission graph design
    - policy evaluation and caching boundaries
    - role-change auditability
    architecture_boundary: Tenant-aware RBAC policy module for application-level authorization checks and permission evolution.
    proof:
      beneficiary_matrix_ref: tenant-rbac-policy/references/implementation.md#beneficiary-matrix
      beneficiary_min_categories: 10
      overlap_review_ref: tenant-rbac-policy/references/implementation.md#overlap-review
